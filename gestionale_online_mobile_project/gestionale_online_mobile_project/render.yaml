services:
  - type: web
    name: gestionale-online
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gestionale-db
          property: connectionString

databases:
  - name: gestionale-db
    plan: free
